# ============================================================
# DHT Anneau - Etape 1 : Join / Leave
# ============================================================

# Graine aléatoire (reproductibilité)
random.seed 12345

# Durée totale de la simulation (unités de temps abstraites)
simulation.endtime 60000

# Nombre de répétitions
simulation.experiments 1

# Taille du réseau : tous les nœuds sont créés dès le départ
# mais seul 1 est ONLINE au démarrage (cf. DHTInitializer)
network.size 20


# ============================================================
# COUCHE TRANSPORT
# ============================================================
protocol.transport peersim.transport.UniformRandomTransport
protocol.transport.mindelay 100
protocol.transport.maxdelay 500


# ============================================================
# PROTOCOLE DHT
# ============================================================
protocol.dht dht.DHTProtocol
protocol.dht.transport transport


# ============================================================
# INITIALISATION
# ============================================================
# DHTInitializer s'exécute avant le début de la simulation
init.dhtinit dht.DHTInitializer
init.dhtinit.protocol dht


# ============================================================
# CONTROLES (exécutés périodiquement pendant la simulation)
# ============================================================

# Contrôleur join/leave
# Déclenche 1 join par step ; leave_rate=0.2 → 20% de chance de départ par step
control.joinleave dht.JoinLeaveControl
control.joinleave.protocol dht
control.joinleave.leave_rate 0.2
control.joinleave.step 2000

# Observateur : vérifie et affiche l'état de l'anneau
control.observer dht.DHTObserver
control.observer.protocol dht
control.observer.step 10000
